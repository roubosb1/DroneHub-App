[build]
  command = "cd netlify/functions && npm install"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Disable ALL asset processing — the app is a single large HTML file with
# inline JS/CSS. Netlify's minifier breaks template literals and event handlers.
[build.processing]
  skip_processing = true

# ── Security + Cache headers ─────────────────────────────────────────────────

# Never cache index.html — always serve fresh on every request
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Security headers applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent this page being embedded in iframes on other sites (clickjacking)
    X-Frame-Options = "DENY"
    # Stop browsers guessing content type — serves exactly what we say
    X-Content-Type-Options = "nosniff"
    # Only send origin (no path/query) in Referer header to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Force HTTPS for 1 year — tells browsers never to try plain HTTP
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Disable browser features the app doesn't need
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"
    # Basic XSS filter for older browsers
    X-XSS-Protection = "1; mode=block"
